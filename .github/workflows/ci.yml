name: ci
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Python syntax check
        run: |
          python -m py_compile scripts/*.py
      - name: Shell syntax check
        run: |
          bash -n scripts/*.sh
